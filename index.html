<div class="container">
    <h2>KM to Miles Converter</h2>

    <input type="text" id="km" placeholder="Enter Kilometers">

    <button onclick="convert()">Convert</button>

    <h3 id="result"></h3>
</div>

<script>
    function convert() {
    let km = document.getElementById("km").value;

     {
        document.getElementById("result").innerHTML = "Please enter kilometers.";
        
    }

    let Meters = km * 1000;

    document.getElementById("result").innerHTML =
        Meters + " Meters";
}
</script>
